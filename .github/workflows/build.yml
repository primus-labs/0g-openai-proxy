name: Build and Push Docker Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  IMAGE_NAMESPACE: primuslabs

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - id: client
            context: ./openai-proxy-client
            dockerfile: ./openai-proxy-client/Dockerfile
            image_suffix: openai-proxy
          - id: attestor
            context: ./openai-proxy-attestor
            dockerfile: ./openai-proxy-attestor/Dockerfile
            image_suffix: openai-proxy-attestor

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAMESPACE }}/${{ matrix.image_suffix }}
          tags: |
            type=ref,event=tag
            type=ref,event=branch
            type=sha,prefix=sha-
          flavor: |
            latest=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,scope=${{ matrix.id }}

      - name: Output build summary
        run: |
          echo "## ${{ matrix.id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ env.IMAGE_NAMESPACE }}/${{ matrix.image_suffix }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Digest: \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tags:" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" | sed 's/^/- `/; s/$/`/' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

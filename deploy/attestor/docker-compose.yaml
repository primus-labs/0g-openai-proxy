services:
  config-init:
    image: alpine:3.18
    environment:
      - KEYSTORE_CONTENT_BASE64=${KEYSTORE_CONTENT_BASE64}
    volumes:
      - keystore:/out/keystore
    command: sh -c 'echo "$$KEYSTORE_CONTENT_BASE64" | base64 -d > /out/keystore/keystore.json && echo "Config and keystore written"'
    networks:
      - default
  openai-proxy-attestor:
    image: primuslabs/openai-proxy-attestor@sha256:6c42523e7518f20867a67e055c458b43984d191e743492ef773b58bbd54fdfbc
    ports:
      - "8081:8081"
      - "8082:8082"
      - "8083:8083"
    environment:
      - SERVER_PORT=8081
      - LD_LIBRARY_PATH=/app/libs
      - JAVA_FULL_NAME=com/pado/PadoCallback
      - KEYSTORE_PATH=${ATTESTOR_KEYSTORE_PATH:-/keystore/keystore.json}
      - KEYSTORE_PASS=${ATTESTOR_KEYSTORE_PASS:-}
    volumes:
      - keystore:/keystore:ro
    networks:
      - default
    restart: unless-stopped
    depends_on:
      config-init:
        condition: service_completed_successfully
volumes:
  keystore:

networks:
  default:
    name: attestor-network
    external: false

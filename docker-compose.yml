version: '3.8'

services:
  openai-proxy:
    build: .
    ports:
      - "3000:3000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-https://api.deepseek.com/v1}
      - UPSTREAM_MODEL=${UPSTREAM_MODEL:-deepseek-chat}
      - PORT=${PORT:-3000}
    restart: unless-stopped

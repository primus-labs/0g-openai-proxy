services:
  openai-proxy-attestor:
    image: virtuex/openai-proxy-attestor:latest
    container_name: openai-proxy-attestor
    ports:
#       primusMpcUrl
      - "${ATTESTOR_PORT:-8081}:8081"
#      - primusProxyUrl
      - "${ATTESTOR_PORT:-8082}:8082"
#      - proxyUrl
      - "${ATTESTOR_PORT:-8083}:8083"
    environment:
      SERVER_PORT: 8081
      JAVA_FULL_NAME: com/pado/PadoCallback
      LD_LIBRARY_PATH: /app/libs
      KEYSTORE_PATH: ${ATTESTOR_KEYSTORE_PATH:-/keystore/keystore.json}
      KEYSTORE_PASS: ${ATTESTOR_KEYSTORE_PASS:-}
    volumes:
      - ./keystore/keystore.json:/keystore/keystore.json
    restart: unless-stopped
